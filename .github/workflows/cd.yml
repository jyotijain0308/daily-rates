name: Deploy to AWS EC2

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment name
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CONTAINER_NAME: ppt-daily-rates
  APP_DIR: /opt/ppt-daily-rates

jobs:
  test:
    name: Test
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest tests/test_api.py

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        run: |
          IMAGE="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ github.sha }}
            ${{ steps.image.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat > ~/.ssh/aws_ec2_key <<'EOF'
          ${{ secrets.AWS_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/aws_ec2_key
          ssh-keyscan -H "${{ secrets.AWS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy container
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}:${{ github.sha }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh -i ~/.ssh/aws_ec2_key "${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }}" \
            "IMAGE='${IMAGE}' \
             GHCR_USERNAME='${GHCR_USERNAME}' \
             GHCR_TOKEN='${GHCR_TOKEN}' \
             CONTAINER_NAME='${CONTAINER_NAME}' \
             APP_DIR='${APP_DIR}' \
             bash -s" <<'EOF'
          set -euo pipefail

          mkdir -p "$APP_DIR"/{instance,output,uploads,assets}

          if [ -n "${GHCR_USERNAME:-}" ] && [ -n "${GHCR_TOKEN:-}" ]; then
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          fi

          docker pull "$IMAGE"

          # Seed the persistent assets volume from the image on first deploy only.
          if [ -z "$(find "$APP_DIR/assets" -mindepth 1 -maxdepth 1 2>/dev/null)" ]; then
            TEMP_CONTAINER="$(docker create "$IMAGE")"
            docker cp "$TEMP_CONTAINER:/app/src/assets/." "$APP_DIR/assets/"
            docker rm "$TEMP_CONTAINER"
          fi

          docker stop "$CONTAINER_NAME" 2>/dev/null || true
          docker rm "$CONTAINER_NAME" 2>/dev/null || true

          docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            -p 80:8000 \
            -e PORT=8000 \
            -v "$APP_DIR/instance:/app/instance" \
            -v "$APP_DIR/output:/app/output" \
            -v "$APP_DIR/uploads:/app/uploads" \
            -v "$APP_DIR/assets:/app/src/assets" \
            "$IMAGE"

          docker image prune -f

          docker exec "$CONTAINER_NAME" python - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=10) as response:
              payload = json.loads(response.read().decode("utf-8"))
              assert payload["status"] == "healthy", payload
          PY
          EOF
